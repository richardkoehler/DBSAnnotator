name: CI - Lint and Type Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      - name: Lint
        run: |
          uv run ruff check --exclude tests .

      - name: Format
        run: |
          uv run ruff format --check --exclude tests .

      # Tests are temporarily disabled in CI until they are ready.
      # To re-enable, uncomment the step below once tests are stable.
      # - name: Run pytest
      #   run: |
      #     uv run pytest

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      - name: Type check
        run: |
          uv run ty check src

