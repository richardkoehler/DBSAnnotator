name: CI - Lint and Type Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      - name: Lint
        run: |
          uv run ruff check .

      - name: Format
        run: |
          uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      - name: Type check
        run: |
          uv run ty check .

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          # Apple Silicon (arm64); see https://github.com/actions/runner-images
          - os: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --locked --dev

      # PySide6 links libEGL even for offscreen; ubuntu-latest images omit it by default.
      - name: Install Qt EGL/XCB dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libdbus-1-3

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run pytest --cov-fail-under=48
