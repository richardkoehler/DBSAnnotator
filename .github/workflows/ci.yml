name: CI - Lint (uv)

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint:
    name: Lint (ruff via uv)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv with Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies with uv (locked, dev)
        run: |
          uv sync --locked --dev

      - name: Run ruff (as in pre-commit)
        run: |
          uv run ruff check --exclude tests .

      # Tests are temporarily disabled in CI until they are ready.
      # To re-enable, uncomment the step below once tests are stable.
      # - name: Run pytest
      #   run: |
      #     uv run pytest

