[project]
name = "clinical-dbs-annotator"
description = "A graphical user interface for annotating DBS clinical programming sessions"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Lucia Poma", email = "lucia.poma@wysscenter.ch" }
]
keywords = ["dbs", "clinical", "annotation", "neuroscience", "deep-brain-stimulation"]
dynamic = ["version"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: MIT License",
    "Environment :: X11 Applications :: Qt",
    "Operating System :: OS Independent",
]
dependencies = [
    "pytz>=2025.2",
    "pandas>=2.1",
    "python-docx>=1.1",
    "docx2pdf>=0.1.8",
    "pydantic>=2.0",
    "pyqtgraph>=0.14.0",
    "pyside6>=6.11.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-qt>=4.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.0",
    # "mypy>=1.8.0",
    "pre-commit>=3.6",
]
build = [
    "pyinstaller>=6.15.0",
    "opencv-python-headless>=4.12.0.88",
    "nuitka>=4.0.7",
]
docs = [
    "sphinx>=9.0.4",
    "sphinx-rtd-theme>=3.1.0",
]

[project.scripts]
clinical-dbs-annotator = "clinical_dbs_annotator.__main__:main"

[project.urls]
Homepage = "https://github.com/bml/clinical-dbs-annotator"
Repository = "https://github.com/bml/clinical-dbs-annotator"
Documentation = "https://github.com/bml/clinical-dbs-annotator/blob/main/README.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/clinical_dbs_annotator/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/clinical_dbs_annotator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--cov=clinical_dbs_annotator",
    "--cov-report=html",
    "--cov-report=term-missing",
]

[tool.ruff]
line-length = 88
target-version = "py314"
extend-exclude = [
    ".eggs",
    ".git",
    ".hatch",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # line too long (handled by formatter/line-length)
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_optional = true

[[tool.mypy.overrides]]
module = "PySide6.*"
ignore_missing_imports = true
