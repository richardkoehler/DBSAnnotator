repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.5
    hooks:
      - id: uv-lock
      
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: ["--fix", "--exclude", "tests"]

  - repo: local
    hooks:
      - id: ty-check
        name: ty check (src)
        entry: uv run ty check src
        language: system
        pass_filenames: false
